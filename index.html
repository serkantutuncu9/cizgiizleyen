<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/css">
        :root {
            --ana-renk: #0f111a;
            --kart-bg: #161925;
            --vurgu: #00f2ff;
            --altin: #ffd700;
            --metin: #e0e0e0;
            --beyaz: #ffffff;
            --status-color: #00ff88;
            --gradient-text: linear-gradient(90deg, #e0e0e0 0%, #00f2ff 50%, #e0e0e0 100%);
        }

        body.light-theme {
            --ana-renk: #f0f4f8 !important;
            --kart-bg: #ffffff !important;
            --vurgu: #000080 !important;
            --metin: #000033 !important;
            --altin: #a67c00 !important;
            --beyaz: #000033 !important;
            --status-color: #000080 !important;
            --gradient-text: linear-gradient(90deg, #000033 0%, #000080 50%, #000033 100%) !important;
        }

        * { transition: background-color 0.4s ease, color 0.4s ease; box-sizing: border-box; }

        body { 
            background-color: var(--ana-renk); 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--metin);
            height: 100vh;
            overflow: hidden;
        }

        .board-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        /* Yazı Boyutu Büyütüldü ve Efekt Sabitlendi */
        .header h2 { 
            margin: 0; font-size: 2rem; font-weight: 900;
            background: var(--gradient-text);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .status-block { display: flex; flex-direction: column; align-items: flex-end; }

        .system-status {
            font-size: 0.8rem; font-weight: 800; letter-spacing: 1px;
            display: flex; align-items: center; gap: 6px; color: var(--beyaz);
            margin-bottom: 4px;
        }

        .status-dot {
            height: 9px; width: 9px; background-color: var(--status-color);
            border-radius: 50%; animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        .clock-controls { display: flex; align-items: center; gap: 15px; }
        .digital-clock { font-size: 1.8rem; font-family: monospace; font-weight: bold; color: var(--beyaz); }

        .icon-btn { cursor: pointer; color: var(--beyaz); font-size: 1.2rem; opacity: 0.8; }

        .table-container { flex-grow: 1; padding: 10px 30px; overflow-y: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }

        thead { position: sticky; top: 0; z-index: 100; background: var(--ana-renk); }
        
        tr { display: flex; width: 100%; border-radius: 12px; min-height: 65px; background: rgba(128,128,128,0.08); }

        th, td { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; padding: 10px; }
        th:nth-child(1), td:nth-child(1) { flex: 0.4; } 
        th:nth-child(2), td:nth-child(2) { flex: 2.5; justify-content: flex-start; padding-left: 25px; font-weight: 600; } 
        th:nth-child(3), td:nth-child(3) { flex: 1; } 
        th:nth-child(4), td:nth-child(4) { flex: 1; } 
        th:nth-child(5), td:nth-child(5) { flex: 1.2; font-weight: 800; color: var(--vurgu); }

        .row-first { border: 2.5px solid var(--altin) !important; background: rgba(255, 215, 0, 0.12) !important; }
        .sticky-leader { position: sticky; top: 55px; z-index: 99; background: var(--kart-bg) !important; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }

        .footer-info { display: flex; justify-content: space-between; padding: 12px 40px; font-size: 0.9rem; background: rgba(0,0,0,0.15); font-weight: bold; }

        /* MOBİL - Yazılar Burada da Büyütüldü */
        @media screen and (max-width: 768px) {
            .header { padding: 12px 15px; }
            .header h2 { font-size: 1.5rem; }
            .digital-clock { font-size: 1.4rem; }
            .table-container { padding: 0 8px; }
            
            tr { min-height: 55px; }
            th, td { font-size: 0.9rem; padding: 6px; }
            
            th:nth-child(1), td:nth-child(1) { flex: 0.35; }
            th:nth-child(2), td:nth-child(2) { flex: 1.8; padding-left: 10px; }
            th:nth-child(3), td:nth-child(3) { flex: 0.8; }
            th:nth-child(4), td:nth-child(4) { flex: 0.8; }
            th:nth-child(5), td:nth-child(5) { flex: 0.9; }

            .footer-info { padding: 10px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="board-container">
    <div class="header">
        <h2>SKOR TABLOSU</h2>
        <div class="status-block">
            <div class="system-status"><span class="status-dot"></span> SİSTEM AKTİF</div>
            <div class="clock-controls">
                <div class="digital-clock" id="live-clock">00:00:00</div>
                <i class="fas fa-lightbulb icon-btn" onclick="toggleTheme()"></i>
                <i class="fas fa-expand icon-btn" onclick="toggleFullScreen()"></i>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>SIRA</th>
                    <th style="justify-content:flex-start; padding-left:25px;">TAKIM ADI</th>
                    <th>SÜRE</th>
                    <th>CEZA</th>
                    <th>TOPLAM</th>
                </tr>
            </thead>
            <tbody id="display-area"></tbody>
        </table>
    </div>

    <div class="footer-info">
        <span id="total-label">Yükleniyor...</span>
        <span id="page-label">Sayfa 1 / 1</span>
    </div>
</div>

<script>
    let allEntries = [];
    let currentPage = 0;
    const othersPerPage = 9; 

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }
    
    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }
    setInterval(updateClock, 1000);

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + '&cb=' + Date.now());
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/);
            const separator = rows[0].includes(';') ? ';' : ',';
            let tempEntries = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator);
                if (cols[1] && cols[1].trim() !== "" && !cols[1].includes("Takım Adı")) {
                    let totalVal = parseFloat(cols[4]?.replace(/"/g, '').replace(',', '.'));
                    tempEntries.push({
                        name: cols[1].replace(/"/g, '').trim(),
                        time: cols[2]?.replace(/"/g, '').trim() || '0',
                        penalty: cols[3]?.replace(/"/g, '').trim() || '0',
                        total: isNaN(totalVal) ? 999 : totalVal
                    });
                }
            }
            tempEntries.sort((a, b) => a.total - b.total);
            allEntries = tempEntries;
            renderTable();
        } catch (err) { console.error("Sync Error"); }
    }

    function renderTable() {
        const tbody = document.getElementById('display-area');
        if (allEntries.length === 0) return;

        const leader = allEntries[0];
        let html = `<tr class="row-first sticky-leader">
            <td><i class="fas fa-trophy" style="color:var(--altin)"></i></td>
            <td>${leader.name}</td>
            <td>${leader.time}s</td>
            <td style="color:#ff4d4d">+${leader.penalty}s</td>
            <td>${leader.total}s</td>
        </tr>`;

        const others = allEntries.slice(1);
        const totalPages = Math.max(1, Math.ceil(others.length / othersPerPage));
        if (currentPage >= totalPages) currentPage = 0;

        const start = currentPage * othersPerPage;
        const currentBatch = others.slice(start, start + othersPerPage);

        currentBatch.forEach((item, index) => {
            html += `<tr>
                <td>${start + index + 2}</td>
                <td>${item.name}</td>
                <td>${item.time}s</td>
                <td style="color:#ff4d4d">+${item.penalty}s</td>
                <td>${item.total}s</td>
            </tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('page-label').innerText = `Sayfa ${currentPage + 1} / ${totalPages}`;
        document.getElementById('total-label').innerText = `Toplam ${allEntries.length} Takım`;
    }

    setInterval(() => {
        const totalPages = Math.ceil((allEntries.length - 1) / othersPerPage);
        if (totalPages > 1) {
            currentPage = (currentPage + 1) % totalPages;
            renderTable();
        }
    }, 15000);

    fetchData();
    setInterval(fetchData, 10000);
    updateClock();
</script>
</body>
</html>
