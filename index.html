<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/css">
        :root {
            --ana-renk: #0f111a;
            --kart-bg: #161925;
            --vurgu: #00f2ff;
            --altin: #ffd700;
            --metin: #e0e0e0;
            --border-rgba: rgba(255,255,255,0.1);
        }

        .light-theme {
            --ana-renk: #f0f2f5;
            --kart-bg: #ffffff;
            --vurgu: #00a8b3;
            --altin: #d4af37;
            --metin: #1a1a1a;
            --border-rgba: rgba(0,0,0,0.1);
        }

        body { 
            background-color: var(--ana-renk); 
            margin: 0; 
            padding: 1vh; /* Dinamik boşluk */
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--metin);
            overflow: hidden;
            transition: background-color 0.3s ease;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .board-container { 
            background: var(--kart-bg); 
            padding: 15px 25px;
            border-radius: 20px; 
            border: 1px solid var(--border-rgba);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 95%;
            max-width: 1100px;
            height: 96vh; /* Ekranın neredeyse tamamını kullan */
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(128,128,128,0.1);
            flex-shrink: 0; /* Header'ın daralmasını engelle */
        }

        .header h2 { 
            margin: 0; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            background: linear-gradient(90deg, #ffffff 0%, var(--vurgu) 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-size: clamp(1.1rem, 2vh, 1.5rem);
            animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
            display: inline-block;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .digital-clock {
            font-size: clamp(1rem, 2.5vh, 1.3rem);
            color: var(--metin);
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        /* TABLO ALANI - ESNEK YAPI */
        .table-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        table { 
            width: 100%; 
            height: 100%; /* Tabloyu tüm alana yay */
            border-collapse: separate; 
            border-spacing: 0 4px; /* Satır aralarını daralttık */
            table-layout: fixed;
        }

        th { color: var(--metin); font-size: 0.7rem; padding: 5px; text-transform: uppercase; opacity: 0.5; }
        
        /* Satırların yüksekliğini otomatik paylaştır */
        td { 
            padding: 0; 
            background: rgba(128,128,128,0.05); 
            font-size: clamp(0.85rem, 1.8vh, 1.1rem); 
            text-align: center;
            height: 8.5%; /* 10 satır için ideal oran */
        }

        td:first-child { border-radius: 10px 0 0 10px; width: 50px; }
        td:last-child { border-radius: 0 10px 10px 0; }

        .row-first td { 
            background: rgba(255, 215, 0, 0.08) !important; 
            border-top: 1px solid rgba(255, 215, 0, 0.4);
            border-bottom: 1px solid rgba(255, 215, 0, 0.4);
            font-weight: bold;
        }

        .toplam-vurgu { color: var(--vurgu); font-weight: bold; }

        .trophy-icon {
            width: 20px;
            height: 20px;
            fill: var(--altin);
            display: block;
            margin: 0 auto;
        }

        .footer-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--metin);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .theme-btn, .fullscreen-btn { cursor: pointer; color: var(--vurgu); opacity: 0.7; transition: 0.2s; }
        
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MOBİL DÜZENLEME */
        @media screen and (max-width: 600px) {
            .board-container { width: 98%; height: 98vh; padding: 10px; }
            td:nth-child(2) { text-align: left; padding-left: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Mobilde süreyi gizleyip yer kazanalım */
        }
    </style>
</head>
<body>

<div class="board-container" id="mainBoard">
    <div class="header">
        <h2>SKOR TABLOSU</h2>
        <div style="text-align: right;">
            <div style="display:flex; align-items:center; gap:12px; justify-content: flex-end;">
                <span style="font-size:0.6rem; color:var(--vurgu); letter-spacing:1px; display: flex; align-items: center;">
                    <span class="status-dot"></span> SİSTEM AKTİF
                </span>
                <i class="fas fa-lightbulb theme-btn" onclick="toggleTheme()"></i>
                <i class="fas fa-expand fullscreen-btn" onclick="toggleFullScreen()"></i>
            </div>
            <div class="digital-clock" id="live-clock">00:00:00</div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">SIRA</th>
                    <th style="text-align: left; padding-left: 20px; width: 40%;">TAKIM ADI</th>
                    <th style="width: 15%;">SÜRE</th>
                    <th style="width: 15%;">CEZA</th>
                    <th style="width: 20%;">TOPLAM</th>
                </tr>
            </thead>
            <tbody id="display-area">
                <!-- JS tarafından doldurulacak -->
            </tbody>
        </table>
    </div>

    <div class="footer-info">
        <span id="page-label">Sayfa 1 / 1</span>
        <span id="total-label">Toplam 0 Takım</span>
    </div>
</div>

<script>
    let allEntries = [];
    let currentPage = 0;
    const itemsPerPage = 10; 
    
    const trophySvg = `<svg class="trophy-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H9v2h6v-2h-2v-3.1c1.88-.31 3.41-1.74 3.61-3.61C19.08 11.63 21 9.55 21 7V6c0-1.1-.9-2-2-2zM5 7h2v2H5V7zm14 2h-2V7h2v2z" /></svg>`;

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }
    setInterval(updateClock, 1000);

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + '&cb=' + Date.now());
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/);
            const separator = rows[0].includes(';') ? ';' : ',';
            let tempEntries = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator);
                if (cols[1] && cols[1].trim() !== "" && !cols[1].includes("Takım Adı")) {
                    let totalVal = parseFloat(cols[4] ? cols[4].replace(/"/g, '').replace(',', '.') : 999);
                    tempEntries.push({
                        name: cols[1].replace(/"/g, '').trim(),
                        time: cols[2] ? cols[2].replace(/"/g, '').trim() : '0',
                        penalty: cols[3] ? cols[3].replace(/"/g, '').trim() : '0',
                        total: isNaN(totalVal) ? 999 : totalVal
                    });
                }
            }
            tempEntries.sort((a, b) => a.total - b.total);
            allEntries = tempEntries;
            renderTable();
        } catch (err) { console.error("Veri hatası."); }
    }

    function renderTable() {
        const tbody = document.getElementById('display-area');
        if (allEntries.length === 0) return;

        const leader = allEntries[0];
        let html = `<tr class="row-first"><td>${trophySvg}</td><td style="text-align: left; padding-left: 20px;">${leader.name}</td><td>${leader.time}s</td><td style="color: #ff6b6b">+${leader.penalty}s</td><td class="toplam-vurgu">${leader.total}s</td></tr>`;

        const otherEntries = allEntries.slice(1);
        const rowsToShow = itemsPerPage - 1; 
        const totalPages = Math.max(1, Math.ceil(otherEntries.length / rowsToShow));
        
        if (currentPage >= totalPages) currentPage = 0;

        const start = currentPage * rowsToShow;
        const currentBatch = otherEntries.slice(start, start + rowsToShow);

        currentBatch.forEach((item, index) => {
            html += `<tr class="fade-in"><td>${start + index + 2}</td><td style="text-align: left; padding-left: 20px;">${item.name}</td><td>${item.time}s</td><td style="color: #ff6b6b">+${item.penalty}s</td><td class="toplam-vurgu">${item.total}s</td></tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('page-label').innerText = `Sayfa ${currentPage + 1} / ${totalPages}`;
        document.getElementById('total-label').innerText = `Toplam ${allEntries.length} Takım`;
    }

    setInterval(() => {
        const totalPages = Math.ceil((allEntries.length - 1) / (itemsPerPage - 1));
        if (totalPages > 1) {
            currentPage = (currentPage + 1) % totalPages;
            renderTable();
        }
    }, 20000);

    setInterval(fetchData, 10000);
    fetchData();
    updateClock();
</script>
</body>
</html>
