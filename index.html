<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/css">
        :root {
            --ana-renk: #0f111a;
            --kart-bg: #161925;
            --vurgu: #00f2ff;
            --altin: #ffd700;
            --metin: #e0e0e0;
            --beyaz: #ffffff;
            --status-color: #00ff88;
            --gold-gradient: linear-gradient(90deg, #b8860b 0%, #ffd700 25%, #ffface 50%, #ffd700 75%, #b8860b 100%);
            --header-gradient: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 50%, #00d2ff 100%);
        }

        body.light-theme {
            --ana-renk: #f0f4f8 !important;
            --kart-bg: #ffffff !important;
            --vurgu: #000080 !important;
            --metin: #000033 !important;
            --altin: #a67c00 !important;
            --beyaz: #000033 !important;
            --status-color: #000080 !important;
        }

        * { transition: background-color 0.4s ease, color 0.4s ease; box-sizing: border-box; }

        body { 
            background-color: var(--ana-renk); 
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--metin);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .board-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.4);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; width: 300px; gap: 20px; }
        .portal-btn { background: none; border: none; color: var(--beyaz); font-size: 1.2rem; cursor: pointer; opacity: 0.8; }
        .portal-btn:hover { color: var(--altin); opacity: 1; }

        .header h2 { 
            margin: 0; font-size: 1.8rem; font-weight: 900;
            background: var(--header-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine-blue 3s linear infinite;
        }

        .project-center-title { text-align: center; flex-grow: 1; }
        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine-gold 2.5s linear infinite;
            text-transform: uppercase;
        }
        .sub-title { font-size: 1.1rem; color: #d4af37; font-weight: 700; margin-top: -5px; }

        @keyframes shine-gold { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        @keyframes shine-blue { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

        .status-block { display: flex; flex-direction: column; align-items: flex-end; width: 300px; }
        .digital-clock { font-size: 1.8rem; font-family: monospace; font-weight: bold; color: var(--beyaz); text-shadow: 0 0 10px var(--vurgu); }

        .table-container { flex-grow: 1; padding: 10px 30px; overflow-y: hidden; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        
        tr { display: flex; width: 100%; border-radius: 12px; min-height: 60px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); align-items: center; }
        th, td { flex: 1; text-align: center; font-size: 1.4rem; padding: 5px; display: flex; justify-content: center; align-items: center; }
        
        /* Sütun Genişlik Ayarları */
        .col-rank { flex: 0.5; }
        .col-name { flex: 3; justify-content: flex-start; padding-left: 30px; }
        .col-time { flex: 1; }
        .col-penalty { flex: 1; }
        .col-total { flex: 1.2; font-weight: 800; color: var(--vurgu); }

        .row-first { 
            background: rgba(255, 215, 0, 0.15) !important; 
            border: 2px solid var(--altin) !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            margin-bottom: 15px;
        }

        .footer-info { display: flex; justify-content: space-between; padding: 15px 40px; background: rgba(0,0,0,0.4); flex-shrink: 0; }
        .waiting-text { font-style: italic; font-size: 0.9rem; color: var(--altin); margin-left: 15px; opacity: 0.8; }

        @media screen and (max-width: 1024px) {
            .main-title { font-size: 1.5rem; }
            .header h2, .status-block, .header-left { width: auto; }
        }
    </style>
</head>
<body>

<div class="board-container">
    <div class="header">
        <div class="header-left">
            <button class="portal-btn" onclick="goToPortal()"><i class="fas fa-home"></i></button>
            <h2>SKOR TABLOSU</h2>
        </div>
        <div class="project-center-title">
            <div class="main-title">TÜRKİYE STEM YARIŞMASI</div>
            <div class="sub-title">Çizgi İzleyen Yarışması</div>
        </div>
        <div class="status-block">
            <div class="digital-clock" id="live-clock">00:00:00</div>
            <div style="font-size: 0.7rem; color: var(--status-color);"><i class="fas fa-circle"></i> SİSTEM AKTİF</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr style="background: none; border: none; font-weight: bold; color: var(--altin);">
                    <th class="col-rank">SIRA</th>
                    <th class="col-name">TAKIM ADI</th>
                    <th class="col-time">SÜRE</th>
                    <th class="col-penalty">CEZA</th>
                    <th class="col-total">TOPLAM</th>
                </tr>
            </thead>
            <tbody id="display-area">
                </tbody>
        </table>
    </div>

    <div class="footer-info">
        <span id="total-label" style="color:var(--altin)">Yükleniyor...</span>
        <div>
            <i class="fas fa-expand icon-btn" style="cursor:pointer; margin-right:20px" onclick="toggleFullScreen()"></i>
            <span id="page-label">Sayfa 1 / 1</span>
        </div>
    </div>
</div>

<script>
    let allEntries = [];
    let currentPage = 0;
    const othersPerPage = 8; // Sayfa başına takım sayısı (Lider hariç)
    let lastDataHash = "";

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    function goToPortal() { window.location.href = "https://serkantutuncu9.github.io/Portal/"; }
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
    
    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }
    setInterval(updateClock, 1000);

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + '&cb=' + Date.now());
            const rawData = await response.text();
            if (rawData === lastDataHash) return;
            lastDataHash = rawData;

            const rows = rawData.split(/\r?\n/);
            const separator = rows[0].includes(';') ? ';' : ',';
            let tempEntries = [];

            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator);
                if (cols[1] && cols[1].trim() !== "" && !cols[1].includes("Takım Adı")) {
                    let timeRaw = cols[2]?.trim() || '0';
                    let penaltyRaw = cols[3]?.trim() || '0';
                    let totalVal = parseFloat(cols[4]?.replace(',', '.'));
                    
                    const isWaiting = (timeRaw === '0' || timeRaw === '') && (penaltyRaw === '0' || penaltyRaw === '');

                    tempEntries.push({
                        name: cols[1].replace(/"/g, '').trim(),
                        time: timeRaw,
                        penalty: penaltyRaw,
                        total: isNaN(totalVal) || isWaiting ? 99999 : totalVal,
                        isWaiting: isWaiting
                    });
                }
            }

            tempEntries.sort((a, b) => {
                if (a.isWaiting !== b.isWaiting) return a.isWaiting ? 1 : -1;
                return a.total - b.total;
            });

            allEntries = tempEntries;
            renderTable();
        } catch (err) { console.error("Veri hatası:", err); }
    }

    function renderTable() {
        const tbody = document.getElementById('display-area');
        if (allEntries.length === 0) return;

        // 1. Sıradaki Lideri Al (Her zaman en üstte)
        const leader = allEntries[0];
        const leaderStatus = leader.isWaiting ? '<span class="waiting-text">Yarışma bekleniyor...</span>' : '';
        const leaderIcon = leader.isWaiting ? '1' : '<i class="fas fa-trophy" style="color:var(--altin)"></i>';

        let html = `
            <tr class="row-first">
                <td class="col-rank">${leaderIcon}</td>
                <td class="col-name"><strong>${leader.name}</strong>${leaderStatus}</td>
                <td class="col-time">${leader.isWaiting ? '-' : leader.time + 's'}</td>
                <td class="col-penalty" style="color:#ff4d4d">${leader.isWaiting ? '-' : '+' + leader.penalty + 's'}</td>
                <td class="col-total">${leader.isWaiting ? '-' : leader.total + 's'}</td>
            </tr>`;

        // Diğerlerini Sayfala (2. sıradan başla)
        const others = allEntries.slice(1);
        const totalPages = Math.max(1, Math.ceil(others.length / othersPerPage));
        
        if (currentPage >= totalPages) currentPage = 0;

        const start = currentPage * othersPerPage;
        const pageItems = others.slice(start, start + othersPerPage);

        pageItems.forEach((item, index) => {
            const status = item.isWaiting ? '<span class="waiting-text">Yarışma bekleniyor...</span>' : '';
            html += `
                <tr>
                    <td class="col-rank">${start + index + 2}</td>
                    <td class="col-name">${item.name}${status}</td>
                    <td class="col-time">${item.isWaiting ? '-' : item.time + 's'}</td>
                    <td class="col-penalty" style="color:#ff4d4d">${item.isWaiting ? '-' : '+' + item.penalty + 's'}</td>
                    <td class="col-total">${item.isWaiting ? '-' : item.total + 's'}</td>
                </tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('page-label').innerText = `Sayfa ${currentPage + 1} / ${totalPages}`;
        document.getElementById('total-label').innerText = `Toplam ${allEntries.length} Takım`;
    }

    // ANA DÖNGÜ (Düzeltildi)
    setInterval(() => {
        if (allEntries.length > 1) {
            const othersCount = allEntries.length - 1;
            const totalPages = Math.ceil(othersCount / othersPerPage);
            
            currentPage++;

            if (currentPage >= totalPages) {
                currentPage = 0; // Başa dön (Sayfa 1)
                fetchData();    // Veriyi güncelle
            } else {
                renderTable();  // Sonraki sayfayı çiz
            }
        } else {
            fetchData();
        }
    }, 12000); // 12 saniyede bir geçiş yap

    fetchData();
    updateClock();
</script>
</body>
</html>
