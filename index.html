<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Skor Tablosu v4</title>
    <style>
        /* TEMA AYARLARI */
        body.dark-mode {
            --bg: #0a0c14;
            --card: #161925;
            --text: #e0e0e0;
            --accent: #00f2ff;
            --border: #333;
        }
        body.light-mode {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #222;
            --accent: #007bff;
            --border: #ddd;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        /* 1. YAZI EFEKTİ - ÇAPRAZ AKIŞLI */
        .title-effect {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            display: inline-block;
            background: linear-gradient(135deg, var(--text) 25%, var(--accent) 50%, var(--text) 75%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGrad 4s linear infinite;
        }

        @keyframes moveGrad {
            to { background-position: 200% center; }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        /* BUTONLAR - BURADALAR! */
        .btn-group { display: flex; gap: 10px; }
        .action-btn {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: center; border-bottom: 2px solid var(--border); color: #888; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); font-size: 1.1rem; }

        .winner { background: rgba(255, 215, 0, 0.15) !important; font-weight: bold; }
        .winner td { border-top: 2px solid gold; border-bottom: 2px solid gold; }

        .footer { margin-top: auto; padding-top: 20px; display: flex; justify-content: center; gap: 30px; color: #888; }
    </style>
</head>
<body class="dark-mode">

<div class="container" id="mainContainer">
    <div class="header">
        <h1 class="title-effect">Skor Tablosu</h1>
        <div class="btn-group">
            <button class="action-btn" onclick="toggleMode()">🌓 Gündüz/Gece</button>
            <button class="action-btn" onclick="fullScreen()">📺 Tam Ekran</button>
        </div>
    </div>

    <div style="flex-grow: 1;">
        <table>
            <thead>
                <tr>
                    <th>SIRA</th>
                    <th style="text-align: left;">TAKIM ADI</th>
                    <th>SÜRE</th>
                    <th>CEZA</th>
                    <th>TOPLAM</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5">Veriler yükleniyor... Lütfen bekleyin.</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <div id="clock" style="font-weight: bold; color: var(--accent);">00:00:00</div>
        <div id="pageInfo">Sayfa: 1</div>
        <div id="totalInfo">Toplam: 0 Takım</div>
    </div>
</div>

<script>
    let entries = [];
    let currentPage = 0;
    const pageSize = 10;
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    // 1. TEMA DEĞİŞTİRME
    function toggleMode() {
        const b = document.body;
        if(b.classList.contains('dark-mode')) {
            b.classList.remove('dark-mode');
            b.classList.add('light-mode');
        } else {
            b.classList.remove('light-mode');
            b.classList.add('dark-mode');
        }
    }

    // 2. TAM EKRAN
    function fullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    // 3. VERİ ÇEKME (DAHA SAĞLAM)
    async function getData() {
        try {
            const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
            const csv = await res.text();
            const rows = csv.split('\n');
            let newEntries = [];

            for(let i=1; i < rows.length; i++) {
                const cols = rows[i].split(/[,;]/); // Hem virgül hem noktalı virgül desteği
                if(cols[1] && cols[1].trim() !== "" && !cols[1].includes("Takım Adı")) {
                    newEntries.push({
                        name: cols[1].replace(/"/g, ''),
                        time: cols[2] || '0',
                        penalty: cols[3] || '0',
                        total: parseFloat(cols[4] ? cols[4].replace(',', '.') : 999)
                    });
                }
            }
            newEntries.sort((a, b) => a.total - b.total);
            entries = newEntries;
            render();
        } catch (e) {
            console.error("Hata:", e);
        }
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        if(entries.length === 0) return;

        const maxPage = Math.ceil((entries.length - 1) / (pageSize - 1));
        if(currentPage >= maxPage) currentPage = 0;

        // Lideri en üste koy
        let html = `
            <tr class="winner">
                <td>🏆 1</td>
                <td style="text-align: left;">${entries[0].name}</td>
                <td>${entries[0].time}s</td>
                <td style="color: red;">+${entries[0].penalty}s</td>
                <td style="color: var(--accent);">${entries[0].total}s</td>
            </tr>
        `;

        // Diğerlerini listele
        const start = currentPage * (pageSize - 1) + 1;
        const pageItems = entries.slice(start, start + (pageSize - 1));

        pageItems.forEach((item, index) => {
            html += `
                <tr>
                    <td>${start + index + 1}</td>
                    <td style="text-align: left;">${item.name}</td>
                    <td>${item.time}s</td>
                    <td style="color: red;">+${item.penalty}s</td>
                    <td style="font-weight: bold;">${item.total}s</td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
        document.getElementById('pageInfo').innerText = `Sayfa: ${currentPage + 1} / ${maxPage}`;
        document.getElementById('totalInfo').innerText = `Toplam: ${entries.length} Takım`;
    }

    // Döngüler
    setInterval(getData, 15000); // 15 saniyede bir veriyi tazele
    setInterval(() => {
        if(entries.length > pageSize) {
            currentPage++;
            render();
        }
    }, 10000); // 10 saniyede bir sayfa değiştir

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
    }, 1000);

    getData();
</script>
</body>
</html>
