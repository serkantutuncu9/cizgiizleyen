<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Tablosu v9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --dark-bg: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --turkuaz: #39c5bb;
            --border: #30363d;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* GEÇİŞ EFEKTLİ BAŞLIK */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            /* Renk Geçiş Efekti */
            background: linear-gradient(90deg, #ffffff 0%, var(--turkuaz) 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .status-area {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .pulse {
            height: 10px; width: 10px;
            background-color: #00ff88;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff88;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* TABLO */
        .table-section { margin-top: 30px; border-top: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { color: #8b949e; font-size: 12px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
        td { padding: 18px; text-align: center; border-bottom: 1px solid rgba(48, 54, 61, 0.4); font-size: 1.1rem; }
        
        .winner-row { background: rgba(57, 197, 187, 0.05); font-weight: bold; }
        .total-highlight { color: var(--turkuaz); font-weight: 800; }

        /* FOOTER */
        .footer { margin-top: 40px; display: flex; justify-content: space-between; align-items: center; color: #8b949e; }
        #clock-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 8px 30px;
            border-radius: 25px;
            color: var(--turkuaz);
            font-weight: 800;
            font-size: 1.3rem;
        }

        .btn { background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; margin-left: 15px; }
        .btn:hover { color: var(--turkuaz); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <div>
            <h1 class="main-title">SKOR TABLOSU</h1>
            <div class="status-area"><span class="pulse"></span> SİSTEM AKTİF</div>
        </div>
        <div>
            <button class="btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
            <button class="btn" onclick="document.documentElement.requestFullscreen()"><i class="fas fa-expand"></i></button>
        </div>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">SIRA</th>
                    <th style="text-align: left; width: 45%;">TAKIM ADI</th>
                    <th style="width: 15%;">SÜRE</th>
                    <th style="width: 15%;">CEZA</th>
                    <th style="width: 15%;">TOPLAM</th>
                </tr>
            </thead>
            <tbody id="scoreData">
                <tr><td colspan="5">Yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        <div id="pageNow">Sayfa: 1</div>
        <div id="clock-box">00:00:00</div>
        <div id="totalTeams">Toplam: 0</div>
    </div>
</div>

<script>
    let list = [];
    let page = 0;
    const size = 10;
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    async function load() {
        try {
            const r = await fetch(URL + '&t=' + Date.now());
            const text = await r.text();
            const rows = text.split('\n').slice(1);
            let items = [];
            rows.forEach(row => {
                const c = row.split(/[,;]/);
                if(c[1] && c[1].trim() !== "" && !c[1].includes("Takım Adı")) {
                    items.push({
                        n: c[1].replace(/"/g, '').trim(),
                        s: c[2] || '0',
                        cz: c[3] || '0',
                        t: parseFloat(c[4] ? c[4].replace(',', '.') : 999)
                    });
                }
            });
            items.sort((a, b) => a.t - b.t);
            list = items;
            draw();
        } catch(e) {}
    }

    function draw() {
        const b = document.getElementById('scoreData');
        if(list.length === 0) return;

        const max = Math.ceil((list.length - 1) / (size - 1)) || 1;
        if(page >= max) page = 0;

        let h = `<tr class="winner-row"><td>🏆 1</td><td style="text-align:left;">${list[0].n}</td><td>${list[0].s}s</td><td style="color:#f85149;">+${list[0].cz}s</td><td class="total-highlight">${list[0].t}s</td></tr>`;
        
        const start = page * (size - 1) + 1;
        list.slice(start, start + (size - 1)).forEach((item, i) => {
            h += `<tr><td>${start + i + 1}</td><td style="text-align:left;">${item.n}</td><td>${item.s}s</td><td style="color:#f85149;">+${item.cz}s</td><td style="font-weight:700;">${item.t}s</td></tr>`;
        });
        b.innerHTML = h;
        document.getElementById('pageNow').innerText = `Sayfa: ${page + 1} / ${max}`;
        document.getElementById('totalTeams').innerText = `Toplam: ${list.length} Takım`;
    }

    // 5 Saniyede Bir Veri Güncelleme [Talep Edilen]
    setInterval(load, 5000); 
    // 10 Saniyede Bir Sayfa Değiştirme
    setInterval(() => { if(list.length > size) { page++; draw(); } }, 10000);
    // Saat
    setInterval(() => { document.getElementById('clock-box').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

    load();
</script>
</body>
</html>
