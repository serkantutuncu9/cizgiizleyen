<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Tablosu v12</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f111a;
            --row-bg: #161925;
            --gold: #ffcc00;
            --turkuaz: #00f2ff;
            --text: #ffffff;
            --gray: #666e7a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            transition: 0.3s;
        }

        /* ÜST BİLGİ ALANI */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .logo span { color: var(--turkuaz); }

        .top-right { text-align: right; }
        .status { font-size: 10px; color: var(--turkuaz); letter-spacing: 1px; margin-bottom: 5px; }
        .controls { display: flex; align-items: center; justify-content: flex-end; gap: 15px; }
        .time { font-size: 20px; font-weight: bold; }
        
        .btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; opacity: 0.7; }
        .btn:hover { opacity: 1; color: var(--turkuaz); }

        /* TABLO TASARIMI (image_ea4cd8.png bazlı) */
        .table-container { width: 100%; }
        
        .table-header {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1fr;
            padding: 10px 30px;
            color: var(--gray);
            font-size: 12px;
            font-weight: bold;
        }

        .row {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1fr 1fr;
            background: var(--row-bg);
            margin-bottom: 12px;
            padding: 20px 30px;
            border-radius: 10px;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        .row div:nth-child(2) { text-align: left; font-weight: bold; }

        /* 1. SIRA ÖZEL VURGU */
        .rank-1 {
            border: 1px solid rgba(255, 204, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.1);
            background: linear-gradient(90deg, rgba(255,204,0,0.1) 0%, var(--row-bg) 100%);
        }
        .rank-1 .rank-box { color: var(--gold); }
        .rank-1 .total { color: var(--turkuaz); font-weight: bold; }

        .total { color: var(--turkuaz); font-weight: bold; }
        .penalty { color: #ff4d4d; }

        /* AYDINLIK MOD */
        .light-mode {
            --bg: #f0f2f5;
            --row-bg: #ffffff;
            --text: #1a1a1a;
            --gray: #888;
        }
        .light-mode .row { box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .light-mode .btn { color: #1a1a1a; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">SKOR <span>TABLOSU</span></div>
    <div class="top-right">
        <div class="status">● SİSTEM AKTİF</div>
        <div class="controls">
            <button class="btn" onclick="toggleTheme()"><i class="fas fa-lightbulb"></i></button>
            <button class="btn" onclick="document.documentElement.requestFullscreen()"><i class="fas fa-expand-arrows-alt"></i></button>
            <div class="time" id="clock">00:00:00</div>
        </div>
    </div>
</div>

<div class="table-container">
    <div class="table-header">
        <div>SIRA</div>
        <div>TAKIM ADI</div>
        <div>SÜRE</div>
        <div>CEZA</div>
        <div>TOPLAM</div>
    </div>
    <div id="tableBody">
        <!-- Veriler Buraya Gelecek -->
    </div>
</div>

<script>
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    async function update() {
        try {
            const r = await fetch(URL + '&t=' + Date.now());
            const text = await r.text();
            const rows = text.split('\n').slice(1);
            let data = [];

            rows.forEach(row => {
                const c = row.split(/[,;]/);
                if(c[1] && c[1].trim() !== "" && !c[1].includes("Takım Adı")) {
                    data.push({
                        n: c[1].replace(/"/g, '').trim(),
                        s: c[2] || '0',
                        cz: c[3] || '0',
                        t: parseFloat(c[4] ? c[4].replace(',', '.') : 999)
                    });
                }
            });

            data.sort((a, b) => a.t - b.t);
            
            let html = '';
            data.slice(0, 10).forEach((item, i) => {
                const isFirst = i === 0;
                html += `
                    <div class="row ${isFirst ? 'rank-1' : ''}">
                        <div class="rank-box">${isFirst ? '<i class="fas fa-trophy"></i>' : i + 1}</div>
                        <div>${item.n}</div>
                        <div>${item.s}s</div>
                        <div class="penalty">+${item.cz}s</div>
                        <div class="total">${item.t}s</div>
                    </div>
                `;
            });
            document.getElementById('tableBody').innerHTML = html;
        } catch(e) { console.log(e); }
    }

    setInterval(update, 5000);
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR');
    }, 1000);

    update();
</script>

</body>
</html>
