<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/css">
        :root {
            --ana-renk: #0f111a;
            --kart-bg: #161925;
            --vurgu: #00f2ff;
            --altin: #ffd700;
            --metin: #e0e0e0;
        }

        /* AYDINLIK MOD - LACİVERT (NAVY) GARANTİ AYARLAR */
        body.light-theme {
            --ana-renk: #f0f4f8 !important;
            --kart-bg: #ffffff !important;
            --vurgu: #000080 !important; /* Lacivert */
            --metin: #000033 !important;
            --altin: #a67c00 !important;
        }

        body { 
            background-color: var(--ana-renk); 
            margin: 0; 
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--metin);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .board-container { 
            background: var(--kart-bg); 
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            background: rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        .header h2 { 
            margin: 0; 
            font-size: 1.6rem;
            color: var(--vurgu);
        }

        .light-theme .header h2 { color: #000080 !important; }

        .digital-clock {
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--vurgu);
        }

        .table-container {
            flex-grow: 1;
            padding: 0 30px;
            overflow-y: auto;
            position: relative;
        }

        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0 8px;
        }

        /* BAŞLIK VE LİDER SABİTLEME */
        thead {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--kart-bg);
        }

        /* Lider satırını sabitlemek için özel ID kullanacağız JS tarafında */
        .sticky-leader {
            position: sticky;
            top: 45px; /* Sütun başlıklarının hemen altında dursun */
            z-index: 90;
            background: var(--kart-bg);
        }

        tr { 
            display: flex; 
            width: 100%;
            background: rgba(128,128,128,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            min-height: 60px;
        }

        .light-theme tr { background: rgba(0,0,128,0.05); }

        th, td { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: clamp(0.9rem, 2vh, 1.3rem);
        }

        th:nth-child(1), td:nth-child(1) { flex: 0.4; } 
        th:nth-child(2), td:nth-child(2) { flex: 2.5; justify-content: flex-start; padding-left: 20px; } 
        th:nth-child(3), td:nth-child(3) { flex: 1; } 
        th:nth-child(4), td:nth-child(4) { flex: 1; } 
        th:nth-child(5), td:nth-child(5) { flex: 1.2; }

        .row-first { 
            background: rgba(255, 215, 0, 0.15) !important; 
            border: 2px solid var(--altin) !important;
        }

        .toplam-vurgu { color: var(--vurgu); font-weight: bold; }
        .light-theme .toplam-vurgu { color: #000080 !important; }

        .footer-info {
            display: flex;
            justify-content: space-between;
            padding: 8px 40px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.1);
        }

        .icon-btn { cursor: pointer; color: var(--vurgu); font-size: 1.2rem; margin-left: 15px; }

        @media screen and (max-width: 600px) {
            th:nth-child(3), td:nth-child(3) { display: none; }
            .header, .footer-info { padding: 10px 15px; }
        }
    </style>
</head>
<body class="dark-theme"> <!-- Varsayılan dark -->

<div class="board-container">
    <div class="header">
        <h2>SKOR TABLOSU</h2>
        <div style="display:flex; align-items:center;">
            <div style="text-align: right; margin-right: 20px;">
                <div class="digital-clock" id="live-clock">00:00:00</div>
            </div>
            <i class="fas fa-adjust icon-btn" onclick="toggleTheme()"></i>
            <i class="fas fa-expand icon-btn" onclick="toggleFullScreen()"></i>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>SIRA</th>
                    <th style="justify-content: flex-start; padding-left: 20px;">TAKIM ADI</th>
                    <th>SÜRE</th>
                    <th>CEZA</th>
                    <th>TOPLAM</th>
                </tr>
            </thead>
            <tbody id="display-area">
                <!-- Veriler buraya gelecek -->
            </tbody>
        </table>
    </div>

    <div class="footer-info">
        <span id="total-label">Yükleniyor...</span>
        <span id="page-label">Sayfa 1 / 1</span>
    </div>
</div>

<script>
    let allEntries = [];
    let currentPage = 0;
    const itemsPerPage = 11; // 1 lider + 10 normal satır

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function toggleFullScreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }
    
    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }
    setInterval(updateClock, 1000);

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + '&cb=' + Date.now());
            const rawData = await response.text();
            const rows = rawData.split(/\r?\n/);
            const separator = rows[0].includes(';') ? ';' : ',';
            let tempEntries = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator);
                if (cols[1] && cols[1].trim() !== "") {
                    let totalVal = parseFloat(cols[4]?.replace(',', '.'));
                    tempEntries.push({
                        name: cols[1].trim(),
                        time: cols[2]?.trim() || '0',
                        penalty: cols[3]?.trim() || '0',
                        total: isNaN(totalVal) ? 999 : totalVal
                    });
                }
            }
            tempEntries.sort((a, b) => a.total - b.total);
            allEntries = tempEntries;
            renderTable();
        } catch (err) { console.error("Veri hatası"); }
    }

    function renderTable() {
        const tbody = document.getElementById('display-area');
        if (allEntries.length === 0) return;

        // 1. SIRADAKİ TAKIM (SABİT)
        const leader = allEntries[0];
        let html = `<tr class="row-first sticky-leader">
            <td><i class="fas fa-trophy" style="color:var(--altin)"></i></td>
            <td>${leader.name}</td>
            <td>${leader.time}s</td>
            <td style="color:#ff4d4d">+${leader.penalty}s</td>
            <td class="toplam-vurgu">${leader.total}s</td>
        </tr>`;

        // DİĞER TAKIMLAR
        const otherEntries = allEntries.slice(1);
        const rowsToShow = 10;
        const totalPages = Math.max(1, Math.ceil(otherEntries.length / rowsToShow));
        
        if (currentPage >= totalPages) currentPage = 0;
        const start = currentPage * rowsToShow;
        const currentBatch = otherEntries.slice(start, start + rowsToShow);

        currentBatch.forEach((item, index) => {
            html += `<tr>
                <td>${start + index + 2}</td>
                <td>${item.name}</td>
                <td>${item.time}s</td>
                <td style="color:#ff4d4d">+${item.penalty}s</td>
                <td class="toplam-vurgu">${item.total}s</td>
            </tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('page-label').innerText = `Sayfa ${currentPage + 1} / ${totalPages}`;
        document.getElementById('total-label').innerText = `Toplam ${allEntries.length} Takım`;
    }

    setInterval(() => {
        const totalPages = Math.ceil((allEntries.length - 1) / 10);
        if (totalPages > 1) {
            currentPage = (currentPage + 1) % totalPages;
            renderTable();
        }
    }, 15000);

    fetchData();
    setInterval(fetchData, 10000);
    updateClock();
</script>
</body>
</html>
