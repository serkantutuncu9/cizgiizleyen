<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style type="text/css">
        :root {
            --ana-renk: #0f111a;
            --kart-bg: #161925;
            --vurgu: #00f2ff;
            --altin: #ffd700;
            --metin: #e0e0e0;
            --border-rgba: rgba(255,255,255,0.1);
        }

        .light-theme {
            --ana-renk: #f0f2f5;
            --kart-bg: #ffffff;
            --vurgu: #00a8b3;
            --altin: #d4af37;
            --metin: #1a1a1a;
            --border-rgba: rgba(0,0,0,0.1);
        }

        body { 
            background-color: var(--ana-renk); 
            margin: 0; 
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--metin);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .board-container { 
            background: var(--kart-bg); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--border-rgba);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            max-width: 1000px;
            height: 90vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: background 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        .header h2 { 
            margin: 0; 
            font-weight: 600; 
            letter-spacing: 1.5px; 
            background: linear-gradient(90deg, #ffffff 0%, var(--vurgu) 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-size: 1.5rem;
            animation: shine 5s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
            display: inline-block;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .digital-clock {
            font-size: 1.3rem;
            color: var(--metin);
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--metin); font-size: 0.75rem; padding: 10px; text-transform: uppercase; opacity: 0.5; }
        td { padding: 12px; background: rgba(128,128,128,0.05); font-size: 1.1rem; text-align: center; }
        td:first-child { border-radius: 12px 0 0 12px; width: 60px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        .row-first td { 
            background: rgba(255, 215, 0, 0.08) !important; 
            border-top: 1px solid rgba(255, 215, 0, 0.4);
            border-bottom: 1px solid rgba(255, 215, 0, 0.4);
            animation: winnerGlow 2s infinite alternate;
        }

        @keyframes winnerGlow {
            from { box-shadow: inset 0 0 5px rgba(255, 215, 0, 0.1); }
            to { box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.3); }
        }

        .toplam-vurgu { color: var(--vurgu); font-weight: bold; }

        .trophy-icon {
            width: 26px;
            height: 26px;
            fill: var(--altin);
            display: block;
            margin: 0 auto;
        }

        .footer-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--metin);
            opacity: 0.4;
        }

        .theme-btn, .fullscreen-btn { cursor: pointer; color: var(--vurgu); opacity: 0.7; transition: 0.2s; }
        .theme-btn:hover, .fullscreen-btn:hover { opacity: 1; }
        
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBİL UYUMLULUK AYARLARI */
        @media screen and (max-width: 600px) {
            body { padding: 10px; overflow-y: auto; }
            .board-container { padding: 15px; height: auto; min-height: 95vh; }
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .header h2 { font-size: 1.1rem; }
            .digital-clock { font-size: 1.1rem; }
            th { font-size: 0.6rem; padding: 5px; }
            td { font-size: 0.85rem; padding: 10px 4px; }
            td:nth-child(2) { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
            .trophy-icon { width: 20px; height: 20px; }
        }
    </style>
</head>
<body>

<div class="board-container" id="mainBoard">
    <div class="header">
        <h2>SKOR TABLOSU</h2>
        <div style="text-align: right;">
            <div style="display:flex; align-items:center; gap:12px; justify-content: flex-end;">
                <span style="font-size:0.6rem; color:var(--vurgu); letter-spacing:2px; display: flex; align-items: center;">
                    <span class="status-dot"></span> SİSTEM AKTİF
                </span>
                <i class="fas fa-lightbulb theme-btn" onclick="toggleTheme()" title="Mod Değiştir"></i>
                <svg class="fullscreen-btn" onclick="toggleFullScreen()" viewBox="0 0 24 24" width="18">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"></path>
                </svg>
            </div>
            <div class="digital-clock" id="live-clock">00:00:00</div>
        </div>
    </div>
    <div style="flex-grow: 1; overflow: hidden;">
        <table>
            <thead>
                <tr>
                    <th>SIRA</th>
                    <th style="text-align: left; padding-left: 20px;">TAKIM ADI</th>
                    <th>SÜRE</th>
                    <th>CEZA</th>
                    <th>TOPLAM</th>
                </tr>
            </thead>
            <tbody id="display-area">
                <!-- Veriler buraya gelecek -->
            </tbody>
        </table>
    </div>
    <div class="footer-info">
        <span id="page-label">Sayfa 1 / 1</span>
        <span id="total-label">Toplam 0 Takım</span>
    </div>
</div>

<script>
    let allEntries = [];
    let currentPage = 0;
    const itemsPerPage = 10; // 1 lider + 9 diğer satır
    
    const trophySvg = `<svg class="trophy-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H9v2h6v-2h-2v-3.1c1.88-.31 3.41-1.74 3.61-3.61C19.08 11.63 21 9.55 21 7V6c0-1.1-.9-2-2-2zM5 7h2v2H5V7zm14 2h-2V7h2v2z" /></svg>`;

    function toggleTheme() { document.body.classList.toggle('light-theme'); }

    function toggleFullScreen() {
        const elem = document.getElementById("mainBoard");
        if (!document.fullscreenElement) elem.requestFullscreen();
        else document.exitFullscreen();
    }

    function updateClock() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }
    setInterval(updateClock, 1000);

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcR-oVEvPsXtMPXJ6bNs2xn3ugUd8OiQYz7lIztA3eqR6u0lMwyuaXReKLJJ7CmnMrTlm6N6RxuN0h/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL + '&cb=' + Date.now());
            const rawData = await response.text();
            if(!rawData || rawData.trim().length < 20) return;
            const rows = rawData.split(/\r?\n/);
            const separator = rows[0].includes(';') ? ';' : ',';
            let tempEntries = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(separator);
                if (cols[1] && cols[1].trim() !== "" && !cols[1].includes("Takım Adı")) {
                    let totalVal = parseFloat(cols[4] ? cols[4].replace(/"/g, '').replace(',', '.') : 999);
                    tempEntries.push({
                        name: cols[1].replace(/"/g, '').trim(),
                        time: cols[2] ? cols[2].replace(/"/g, '').trim() : '0',
                        penalty: cols[3] ? cols[3].replace(/"/g, '').trim() : '0',
                        total: isNaN(totalVal) ? 999 : totalVal
                    });
                }
            }
            tempEntries.sort((a, b) => a.total - b.total);
            allEntries = tempEntries;
            renderTable();
        } catch (err) { console.error("Veri hatası."); }
    }

    function renderTable() {
        const tbody = document.getElementById('display-area');
        if (allEntries.length === 0) return;

        // 1. TAKIMI SABİTLE
        const leader = allEntries[0];
        let html = `<tr class="row-first"><td>${trophySvg}</td><td style="text-align: left; padding-left: 20px; color:var(--metin); font-weight: 500;">${leader.name}</td><td>${leader.time}s</td><td style="color: #ff6b6b">+${leader.penalty}s</td><td class="toplam-vurgu">${leader.total}s</td></tr>`;

        // DİĞER TAKIMLARIN SAYFALAMA MANTIĞI
        const otherEntries = allEntries.slice(1);
        const rowsToShow = itemsPerPage - 1; 
        const totalPages = Math.max(1, Math.ceil(otherEntries.length / rowsToShow));
        
        if (currentPage >= totalPages) currentPage = 0;

        const start = currentPage * rowsToShow;
        const end = start + rowsToShow;
        const currentBatch = otherEntries.slice(start, end);

        currentBatch.forEach((item, index) => {
            const realRank = start + index + 2; 
            html += `<tr class="fade-in"><td>${realRank}</td><td style="text-align: left; padding-left: 20px; color:var(--metin);">${item.name}</td><td>${item.time}s</td><td style="color: #ff6b6b">+${item.penalty}s</td><td class="toplam-vurgu">${item.total}s</td></tr>`;
        });

        tbody.innerHTML = html;
        document.getElementById('page-label').innerText = `Sayfa ${currentPage + 1} / ${totalPages}`;
        document.getElementById('total-label').innerText = `Toplam ${allEntries.length} Takım`;
    }

    setInterval(() => {
        const otherEntriesCount = allEntries.length - 1;
        const rowsToShow = itemsPerPage - 1;
        const totalPages = Math.ceil(otherEntriesCount / rowsToShow);
        
        if (otherEntriesCount > rowsToShow) {
            currentPage = (currentPage + 1) % totalPages;
            renderTable();
        }
    }, 20000);

    setInterval(fetchData, 10000);
    fetchData();
    updateClock();
</script>
</body>
</html>
